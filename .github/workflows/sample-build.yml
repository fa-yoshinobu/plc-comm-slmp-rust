name: Sample build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  sample-build:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build examples
        run: cargo build --examples
