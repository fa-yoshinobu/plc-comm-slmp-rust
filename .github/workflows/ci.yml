name: ci

on:
  push:
  pull_request:

jobs:
  rust-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          path: plc-comm-slmp-rust

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt
        working-directory: plc-comm-slmp-rust
        run: cargo fmt --all --check

      - name: Cargo clippy
        working-directory: plc-comm-slmp-rust
        run: cargo clippy --all-targets --features cli -- -D warnings

      - name: Cargo test
        working-directory: plc-comm-slmp-rust
        run: cargo test

      - name: Check napi crate
        working-directory: plc-comm-slmp-rust
        run: cargo check -p slmp-node

      - name: Build verify client
        working-directory: plc-comm-slmp-rust
        run: cargo build --features cli --bin slmp_verify_client

  trigger-docs-rebuild:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: rust-core
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs rebuild
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          if [ -z "$DOCS_REPO_TOKEN" ]; then
            echo "::notice::DOCS_REPO_TOKEN is not configured; skipping docs rebuild dispatch."
            exit 0
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DOCS_REPO_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/fa-yoshinobu/plc-comm-docs-site/dispatches \
            -d '{"event_type":"source-updated","client_payload":{"repo":"${{ github.repository }}"}}'
