name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Resolve release version
        id: version
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Check canonical SLMP profile JSONs
        shell: pwsh
        run: ./scripts/update_slmp_profile_jsons.ps1 -FailIfChanged

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --features cli -- -D warnings

      - name: Cargo test
        run: cargo test

      - name: Package crate
        run: cargo package -p plc-comm-slmp

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          asset="target/package/plc-comm-slmp-${{ steps.version.outputs.version }}.crate"
          test -f "${asset}"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; then
            gh release upload "${tag}" "${asset}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" "${asset}" --repo "${GITHUB_REPOSITORY}" --title "Release ${tag}" --generate-notes --target main
          fi
