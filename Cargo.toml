[package]
name = "plc-comm-slmp-rust"
version = "0.1.2"
edition = "2024"
rust-version = "1.85"
description = "Async Rust SLMP client based on the plc-comm-slmp-dotnet implementation"
license = "MIT"
readme = "README.md"
repository = "https://github.com/fa-yoshinobu/plc-comm-slmp-rust"
homepage = "https://github.com/fa-yoshinobu/plc-comm-slmp-rust"
documentation = "https://docs.rs/plc-comm-slmp-rust"
keywords = ["slmp", "plc", "mitsubishi", "mcprotocol", "tokio"]
categories = ["network-programming", "asynchronous"]
include = [
    "Cargo.toml",
    "README.md",
    "src/**",
    "examples/**",
    "tests/**",
    "docs/**",
]

[lib]
name = "plc_comm_slmp"

[[bin]]
name = "slmp_verify_client"
path = "src/bin/slmp_verify_client.rs"

[workspace]
members = ["crates/slmp-node"]
default-members = ["."]
resolver = "2"

[dependencies]
async-stream = "0.3"
futures-core = "0.3"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }

[dev-dependencies]
serde_json = "1"
tokio = { version = "1", features = ["io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }
